[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # Secrets scanner: heslo (BANNER_PASSWORD) a tajný kľúč (BANNER_SECRET)
  # sa čítajú výhradne server-side v Netlify funkciách a NIKDY sa neobjavia
  # v klientskom výstupe. Preto tieto kľúče vynechávame zo skenovania,
  # aby scanner nehlásil falošný poplach. Skenovanie pre iné hodnoty zostáva aktívne.
  SECRETS_SCAN_OMIT_KEYS = "BANNER_PASSWORD,BANNER_SECRET"
  # Nesken súbory, ktoré sa nepublikujú ako súčasť appky
  SECRETS_SCAN_OMIT_PATHS = "server.js,proxy.php,SPUSTI.bat,fix_date.py,.htaccess"

# Env premenné nastav v Netlify dashboarde:
# Site configuration → Environment variables → Add variable
#   BANNER_PASSWORD = tvoje heslo
#   BANNER_SECRET   = náhodný tajný reťazec (aspoň 32 znakov)
